<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Descargador de Música</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #667eea;
        }

        button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            text-align: center;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
        }

        .status.loading {
            display: block;
            background: #fff3cd;
            color: #856404;
        }

        .status.success {
            display: block;
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #856404;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .history {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .history h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .song-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .song-name {
            color: #555;
            font-size: 0.9rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 250px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Descargador de Música</h1>
        <p class="subtitle">Pega un enlace de YouTube y descarga el audio</p>
        
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="https://youtube.com..." autocomplete="off">
            <!-- El botón llama estrictamente a la función procesarDescarga -->
            <button id="downloadBtn" onclick="procesarDescarga()">⬇️ Descargar</button>
        </div>
        
        <div id="status" class="status"></div>
        
        <div class="history" id="history" style="display: none;">
            <h3>📥 Descargas recientes</h3>
            <div id="songsList"></div>
        </div>
    </div>

    <script>
        let descargas = [];

        function procesarDescarga() {
            const url = document.getElementById('urlInput').value.trim();
            const btn = document.getElementById('downloadBtn');
            
            if (!url) {
                mostrarEstado('Por favor ingresa una URL de YouTube', 'error');
                return;
            }
            
            btn.disabled = true;
            mostrarEstado('<span class="spinner"></span>Enviando enlace al servidor de descargas...', 'loading');
            
            // Usamos una ruta relativa directa para que nunca falle la comunicación local
            window.location.href = "/descargar?url=" + encodeURIComponent(url);
            
            const idSimulado = Math.floor(Math.random() * 1000);
            agregarAHistorial("Canción_" + idSimulado + ".mp3");

            setTimeout(() => {
                btn.disabled = false;
                mostrarEstado('✅ Archivo procesado. Revisa tu consola de VS Code para el diagnóstico.', 'success');
            }, 5000);
        }

        function mostrarEstado(mensaje, tipo) {
            const status = document.getElementById('status');
            status.innerHTML = mensaje;
            status.className = 'status ' + tipo;
        }

        function agregarAHistorial(nombre) {
            const history = document.getElementById('history');
            const list = document.getElementById('songsList');
            
            descargas.unshift(nombre);
            if (descargas.length > 5) descargas.pop();
            
            history.style.display = 'block';
            list.innerHTML = descargas.map(song => `
                <div class="song-item">
                    <span class="song-name">🎵 ${song}</span>
                    <span style="color: #28a745; font-size: 0.8rem; font-weight: bold;">Enviado</span>
                </div>
            `).join('');
        }

        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') procesarDescarga();
        });
    </script>
</body>
</html>
